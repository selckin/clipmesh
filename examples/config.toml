# clipmesh example configuration
# Copy to ~/.config/clipmesh/config.toml and edit.
# clipmesh watches this file and restarts to apply any change.

# 0.0.0.0 binds every interface; restrict to a specific LAN address (or
# firewall the port) on hosts reachable from untrusted networks. Traffic is
# Noise-encrypted, so peers without the psk can neither read nor inject.
listen = "0.0.0.0:48100"

# List every other node directly. clipmesh connects peers point-to-point and
# does not forward between them, so leaving a node out here means copies won't
# reach it, even via a shared third node.
peers = ["host-b:48100", "host-c:48100"]

# Exactly one of psk, psk_file, psk_env:
psk_file = "~/.config/clipmesh/psk"   # file containing the shared secret
# psk = "supersecret"                  # inline secret
# psk_env = "CLIPMESH_PSK"             # name of an environment variable

# Everything below is optional (defaults shown):
# max_payload_size = "32MiB"  # skip clipboard contents larger than this (whole offer)
# debounce_ms = 100           # quiet period before broadcasting
# sync_primary = false        # also sync the middle-click primary selection
# direction = "both"          # "both" | "send_only" | "receive_only"
# exclude_sensitive = true    # skip password-manager-flagged contents
# resync_on_connect = true    # push current clipboard to peers when they (re)connect
# share_mime_rules = true    # share the MIME-rules file across the mesh (below)
# log_level = "info"          # overridable with RUST_LOG

# Which MIME types sync is controlled per-type by a separate rules file (see
# below). unknown_mime decides what happens to a type with no rule yet:
# "deny" (default) means nothing syncs until you allow it; "allow" syncs
# everything not explicitly denied.
# unknown_mime = "deny"

# Per-type allow/deny rules file (TOML). Defaults to "mimetypes" beside this
# config. Each entry under [rules] is, e.g.:
#     [rules]
#     "text/plain" = "allow"
#     "image/png"  = { rule = "allow", max = "4MiB" }
#     "image/bmp"  = "deny"
# Keys are quoted TOML strings, so MIME types with spaces or punctuation are
# fine. clipmesh creates the file, appends any new type it sees (using
# unknown_mime), leaves your existing entries/comments/order alone, and reloads
# it when it changes — edit it to choose what syncs. An optional per-type
# max-size caps that type on top of max_payload_size.
# mime_rules_file = "~/.config/clipmesh/mimetypes"

# When share_mime_rules is on (default), clipmesh keeps the MIME-rules file in
# sync across the mesh: edit it on one host and the others converge to it. It is
# whole-file last-writer-wins — the most recently edited file wins outright and
# replaces the others (it does not merge per-type), and clipmesh stamps the file
# with a managed "# clipmesh-version:" header line to order edits. Turn it off to
# keep each host's rules independent.
