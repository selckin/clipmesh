# clipmesh configuration. Generate/refresh with `clipmesh --sync-config`:
# it fills in every option and these comments, keeping the values you've
# set. A commented-out line means the option is unset and its default
# applies; the value shown is that default, except where the comment
# calls it an example. clipmesh watches this file and restarts to apply
# a change.

# 0.0.0.0 binds every interface; restrict to a specific LAN address (or
# firewall the port) on hosts reachable from untrusted networks. Traffic is
# Noise-encrypted, so peers without the psk can neither read nor inject.
listen = "0.0.0.0"

# Port to listen on. Peers below that omit their own port reuse this one.
# Put the port here, not in `listen`.
port = 48100

# List every other node directly. clipmesh connects peers point-to-point
# and never forwards between them, so a node left out here won't receive
# copies. Add ":port" to override the shared port for one peer.
# The hosts below are an example: unset, this node dials nobody and only
# accepts connections others make to it.
peers = ["host-b", "host-c"]

# Exactly one of psk_file / psk / psk_env must be set: psk_file points to a
# file holding the shared secret, psk is the secret inline, psk_env names an
# environment variable holding it. The values below are examples — every
# node in the mesh must end up with the same secret.
psk_file = "~/.config/clipmesh/psk"
# psk = "supersecret"
# psk_env = "CLIPMESH_PSK"

# Everything below is optional.

# Skip clipboard contents larger than this (whole offer).
# max_payload_size = "32MiB"

# Quiet period (ms) before broadcasting, to coalesce rapid copies.
# debounce_ms = 100

# Also sync the middle-click selection across the mesh.
# sync_selection = false

# "both" | "send_only" | "receive_only".
# direction = "both"

# Skip password-manager-flagged contents.
# exclude_sensitive = true

# Push current clipboard to peers when they (re)connect.
# resync_on_connect = true

# Share the MIME-rules file across the mesh (whole-file last-writer-wins:
# the most recently edited file wins outright and replaces the others, not
# a per-type merge). Turn off to keep each host's rules independent.
# share_mime_rules = true

# Log a one-line summary (at info level, so needs log_level >= info) per
# detected copy and received update.
# verbose = false

# Overridable with RUST_LOG.
# log_level = "info"

# What to do with a MIME type that has no rule yet: "deny" syncs nothing
# until you allow it; "allow" syncs everything not explicitly denied.
# unknown_mime = "deny"

# When a copied selection offers only a legacy X11 plain-text atom
# (UTF8_STRING/STRING/TEXT) and no text/plain* rep, synthesize
# text/plain;charset=utf-8 and text/plain from it so Wayland-native apps
# can paste it. The synthesized types go through the MIME rules below.
# synthesize_text_plain = false

# After a local copy, re-offer the selection so clipmesh owns it: the
# clipboard then survives the source app exiting, and (with
# synthesize_text_plain) X11-sourced content pastes on THIS host too. Never
# re-owns password-manager-flagged content while exclude_sensitive is on.
# take_ownership = false

# Per-type allow/deny rules file (TOML). Defaults to "mimetypes" beside
# this config, wherever this config lives — so the path below is an example
# of that, not a fixed default: setting it pins the rules file even if the
# config moves. clipmesh creates the file, appends any new type it sees (per
# unknown_mime), keeps it sorted, and reloads on change. Edit it or run
# `clipmesh --allow/--deny "<glob>"` (and `clipmesh --rules` to list).
# mime_rules_file = "~/.config/clipmesh/mimetypes"

# Locally mirror between the Ctrl+C clipboard and the mouse-highlight /
# middle-click selection on THIS host (separate from sync_selection, which
# is mesh-wide). Each direction is independent and off unless true.
# WARNING: selection_to_clipboard makes selecting any text overwrite your
# clipboard — and, because the clipboard is always synced when this node
# sends, your peers' clipboards too.
# [link_selections]
# clipboard_to_selection = false
# selection_to_clipboard = false
